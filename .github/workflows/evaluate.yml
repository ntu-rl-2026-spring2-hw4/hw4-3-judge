name: Evaluate HW4 Q3

# Reusable workflow invoked by each student's repo via `uses:`.
# Runs on a self-hosted runner (docker container on TA machine).
# LEADERBOARD_TOKEN is baked into the runner container's env_file, so
# students do NOT need to set any repo secret.

on:
  workflow_call:

jobs:
  evaluate:
    runs-on: self-hosted

    steps:
      # ── Checkout student + judge ──────────────────────────────────────
      - name: Checkout student submission
        uses: actions/checkout@v4
        with:
          path: student

      - name: Remove .git from student submission
        run: rm -rf student/.git

      - name: Checkout judge
        uses: actions/checkout@v4
        with:
          repository: ntu-rl-2026-spring2-hw4/hw4-3-judge
          path: judge

      # ── Resolve + validate student ID from Q3/meta.xml ───────────────
      - name: Extract student ID from meta.xml
        id: meta
        run: |
          student_id=$(python3 - <<'PYEOF'
          import sys, xml.etree.ElementTree as ET
          try:
              tree = ET.parse("student/Q3/meta.xml")
              val = tree.find("./info/name")
              if val is None or not (val.text or "").strip():
                  raise ValueError
              print(val.text.strip().lower())
          except FileNotFoundError:
              print("::error::Q3/meta.xml not found. Make sure it exists in your repo.", file=sys.stderr)
              sys.exit(1)
          except Exception:
              print("::error::Q3/meta.xml is malformed. Check that <info><name>your_id</name></info> is present.", file=sys.stderr)
              sys.exit(1)
          PYEOF
          )
          echo "student_id=$student_id" >> "$GITHUB_OUTPUT"

      - name: Reject template placeholder
        run: |
          SID="${{ steps.meta.outputs.student_id }}"
          if [ "$SID" = "r00000000" ]; then
            echo "::error::Student ID is r00000000 — the template placeholder. Update Q3/meta.xml with your real student ID."
            exit 1
          fi

      # ── Python env via uv ────────────────────────────────────────────
      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          uv venv --clear .venv
          echo "$GITHUB_WORKSPACE/.venv/bin" >> "$GITHUB_PATH"
          # Judge's pinned RL/sim stack first.
          uv pip install --python .venv/bin/python -r judge/requirements.txt
          # Torch (CPU) for any student policies that use it.
          uv pip install --python .venv/bin/python torch --index-url https://download.pytorch.org/whl/cpu
          # Student deps (may re-pin some packages — on them if it breaks).
          if [ -f "student/Q3/requirements.txt" ]; then
            uv pip install --python .venv/bin/python -r student/Q3/requirements.txt
          elif [ -f "student/requirements.txt" ]; then
            uv pip install --python .venv/bin/python -r student/requirements.txt
          fi

      # ── Evaluation ───────────────────────────────────────────────────
      - name: Run judge
        id: eval
        env:
          MUJOCO_GL: osmesa
          PYTHONUNBUFFERED: "1"
        run: |
          set -o pipefail
          python judge/judge.py \
            --student-path student/Q3 \
            --output results.json \
            | tee judge.log
          echo "--- results.json ---"
          cat results.json

      # ── Submit to leaderboard ────────────────────────────────────────
      - name: Submit to leaderboard
        run: |
          python - <<'EOF'
          import json, os, urllib.request

          results = json.load(open("results.json"))

          payload = json.dumps({
              "event_type": "submit_score",
              "client_payload": {
                  "student_id": "${{ steps.meta.outputs.student_id }}",
                  "results":    results,
                  "audit": {
                      "repository": "${{ github.repository }}",
                      "run_id":     "${{ github.run_id }}",
                      "run_url":    "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}",
                      "sha":        "${{ github.sha }}",
                      "actor":      "${{ github.actor }}",
                  },
              }
          }).encode()

          class PostRedirectHandler(urllib.request.HTTPRedirectHandler):
              def redirect_request(self, req, fp, code, msg, headers, newurl):
                  return urllib.request.Request(
                      newurl, data=req.data, headers=dict(req.headers), method=req.method
                  )

          req = urllib.request.Request(
              "https://api.github.com/repos/ntu-rl-2026-spring2-hw4/hw4-3-leaderboard/dispatches",
              data=payload,
              headers={
                  "Authorization": f"Bearer {os.environ['LEADERBOARD_TOKEN']}",
                  "Accept": "application/vnd.github.v3+json",
                  "Content-Type": "application/json",
              },
              method="POST",
          )
          opener = urllib.request.build_opener(PostRedirectHandler)
          with opener.open(req) as r:
              print(f"Submitted: HTTP {r.status}")
          EOF
